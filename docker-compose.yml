services:
  postgres:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      # Подтягиваем данные из .env
      POSTGRES_DB: ${SQL_DATABASE}
      POSTGRES_USER: ${SQL_USER}
      POSTGRES_PASSWORD: ${SQL_PASSWORD}
    healthcheck:
      # Обратите внимание: тут мы тоже используем переменные, чтобы healthcheck не сломался
      test: [ "CMD-SHELL", "pg_isready -U ${SQL_USER} -d ${SQL_DATABASE}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  django:
    build: .
    env_file:
      - .env
    command: >
      sh -c "python manage.py collectstatic --noinput &&
                   python3 manage.py migrate &&
                   daphne -b 0.0.0.0 -p 8000 ${DJANGO_PROJECT_NAME}.asgi:application"
    volumes:
      - .:/app
      - static_volume:/app/static
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_PROJECT_NAME}.settings

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      
    restart: unless-stopped
    
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.django.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/var/www/static/:ro
    depends_on:
      - django
      
  redis:
    image: "redis:7-alpine"
    container_name: redis  
    ports:
      - "6379:6379"
    restart: unless-stopped
    
  celery_worker:
    build: .
    env_file:
      - .env
    volumes:
      - .:/app
    command: celery -A notifications.tasks worker --loglevel=info
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_PROJECT_NAME}.settings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
        
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_service
    ports:
      - "5672:5672"   
      - "15672:15672" 
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}

volumes:
    postgres_data:
    static_volume:
